services:
  postgres:
    image: postgres:16
    container_name: airbnb-postgres
    environment:
      POSTGRES_USER: airbnb
      POSTGRES_PASSWORD: airbnb
      POSTGRES_DB: airbnb
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: airbnb-api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://airbnb:airbnb@postgres:5432/airbnb
      TOKENIZERS_PARALLELISM: "false"
      OMP_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    volumes:
      - .:/app

volumes:
  postgres_data: